baseURL = 'https://fe-berserker.github.io/Website1/'
languageCode = 'zh-CN'
title = 'Baffalo'
theme = 'kong-htop'

[params]
    # 作者信息
    author = 'FE-Beserker'
    # 数学公式支持 - 全局启用
    math = true
    
    # 亮色模式颜色
    link_color = "#268bd2"
    text_color = "#222"
    
    # 深色模式颜色
    dark_link_color = "#58a6ff"
    dark_text_color = "#c9d1d9"
    dark_background = "#0d1117"
    
    # 头像设置
    avatar = '/images/Baffalo.png'
    
    # 社交媒体链接
    github = 'https://github.com/FE-Berserker'
    zhihu = 'https://www.zhihu.com/column/c_1920893344915096610'
    email = 'mailto:392176462@qq.com'
    qq = 'http://wpa.qq.com/msgrd?v=3&uin=392176462&site=qq&menu=yes'

# 菜单配置 - Baffalo 分类体系
[[menu.main]]
    name = '首页'
    url = '/'
    weight = 10

[[menu.main]]
    name = 'Baffalo框架'
    url = '/categories/Baffalo框架/'
    weight = 20

[[menu.main]]
    name = 'Baffalo部件'
    url = '/categories/Baffalo部件/'
    weight = 30

[[menu.main]]
    name = 'Baffalo方法'
    url = '/categories/Baffalo方法/'
    weight = 40

[[menu.main]]
    name = 'Baffalo求解'
    url = '/categories/Baffalo求解/'
    weight = 50

[[menu.main]]
    name = 'Baffalo案例'
    url = '/categories/Baffalo案例/'
    weight = 60

[[menu.main]]
    name = 'Baffalo笔记'
    url = '/categories/Baffalo笔记/'
    weight = 70

[[menu.main]]
    name = '标签'
    url = '/tags/'
    weight = 80

[[menu.main]]
    name = '搜索'
    url = '/search/'
    weight = 90

# 页脚菜单
[[menu.footer]]
    name = 'GitHub'
    url = 'https://github.com/FE-Berserker'
    weight = 10

[[menu.footer]]
    name = '知乎'
    url = 'https://www.zhihu.com/column/c_1920893344915096610'
    weight = 20

# 分页配置
[pagination]
pagerSize = 15

# 输出格式（用于搜索功能）
[outputs]
home = ["HTML", "RSS", "JSON"]
section = ["HTML", "RSS"]

# Markdown 配置（数学公式 passthrough）
[markup]
    [markup.goldmark]
        [markup.goldmark.extensions]
            [markup.goldmark.extensions.passthrough]
                enable = true
                [markup.goldmark.extensions.passthrough.delimiters]
                    block = [['\[', '\]'], ['$$', '$$']]
                    inline = [['\(', '\)']]

# 分类法（标签和分类）
[taxonomies]
    tag = 'tags'
    category = 'categories'

# 隐私配置
[privacy]
    [privacy.disqus]
        disable = true
    [privacy.googleAnalytics]
        disable = true
